<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SterisCollection admin panel." />
    <title>Admin — SterisCollection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(99,102,241,0.18),transparent_35%),linear-gradient(180deg,#0f172a_0%,#020617_100%)] px-6 py-10 sm:px-10">
      <header class="fixed inset-x-0 top-0 z-50 border-b border-slate-800 bg-slate-950/95 backdrop-blur-xl">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-6 lg:px-8">
          <a href="./index.html" class="inline-flex items-center gap-3 text-pink-300 text-lg font-semibold">
            ← Back to shop
          </a>
          <button id="logoutButton" class="inline-flex items-center gap-2 rounded-full border border-slate-700 bg-slate-900/80 px-4 py-2 text-sm text-slate-200 transition hover:border-slate-500 hover:text-white">
            Logout
          </button>
        </div>
      </header>

      <main class="mx-auto max-w-6xl px-6 pb-20 pt-[8rem] sm:px-8 lg:px-12">
        <section class="rounded-[2rem] border border-slate-800 bg-slate-900/80 p-10 shadow-soft">
          <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <p class="text-sm uppercase tracking-[0.35em] text-pink-200">Admin panel</p>
              <h1 class="mt-3 text-3xl font-semibold text-white sm:text-4xl">Manage gallery images</h1>
              <p class="mt-4 text-sm leading-7 text-slate-400">Upload or change the lookbook photos that display on the homepage. Your edits are saved locally in the browser.</p>
            </div>
            <div class="flex flex-wrap gap-3">
              <button id="saveGallery" class="rounded-full bg-pink-500 px-5 py-3 text-sm font-semibold text-white transition hover:bg-pink-400">Save gallery</button>
              <button id="resetGallery" class="rounded-full border border-slate-700 bg-slate-900/80 px-5 py-3 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:text-white">Reset defaults</button>
            </div>
          </div>

          <p id="adminMessage" class="mt-4 text-sm text-pink-100"></p>

          <section id="subscriberSection" class="mt-8 rounded-[2rem] border border-slate-800 bg-slate-900/80 p-8 text-slate-300">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <p class="text-xs uppercase tracking-[0.35em] text-pink-200">Subscribers</p>
                <h2 class="mt-3 text-2xl font-semibold text-white">Newsletter signups</h2>
                <p class="mt-3 text-sm leading-6 text-slate-400">Saved emails from the homepage subscription form.</p>
              </div>
              <span id="subscriberCount" class="rounded-full bg-pink-500/10 px-4 py-2 text-sm font-semibold text-pink-100">0 subscribers</span>
            </div>
            <div id="subscriberList" class="mt-6 space-y-3 text-sm text-slate-300">
              <p class="text-sm text-slate-500">No subscribers yet.</p>
            </div>
          </section>

          <div id="galleryContainer" class="mt-8 grid gap-6 sm:grid-cols-2 xl:grid-cols-3"></div>
        </section>
      </main>
    </div>
    <script type="module" src="./src/admin.js"></script>
  </body>
</html>
